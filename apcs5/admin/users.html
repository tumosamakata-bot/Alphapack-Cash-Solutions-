<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users · Alpha Pack Admin</title>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body data-page="admin_users">
<div class="bg-canvas"><div class="bg-gradient"></div><canvas id="particleCanvas"></canvas></div>
<div id="pageLoader"><div class="loader-mark">AP</div><div class="loader-track"><div class="loader-bar"></div></div></div>
<div class="admin-bar">⚠ <strong>ADMIN AREA</strong> — Authorised staff only.</div>
<nav class="nav" style="top:36px"><div class="nav-wrap">
  <a href="../index.html" class="nav-logo" target="_blank"><div class="nav-logo-mark" style="background:linear-gradient(135deg,#e85555,#c0392b)">AP</div><div class="nav-logo-text"><strong>Admin Panel</strong><span style="color:var(--red)">Alpha Pack</span></div></a>
  <nav class="nav-center"><a href="dashboard.html" class="nav-link">Dashboard</a><a href="insights.html" class="nav-link">Insights</a><a href="settings.html" class="nav-link">Settings</a><a href="ads.html" class="nav-link">Ads</a><a href="users.html" class="nav-link">Users</a></nav>
  <div class="nav-right"><button id="adminLogout" class="btn btn-ghost btn-sm">Log out</button></div>
  <button class="nav-burger" id="navBurger"><span></span><span></span><span></span></button>
</div></nav>
<div class="nav-drawer" id="navDrawer" style="top:calc(36px + var(--nav-h))">
  <a href="dashboard.html" class="nav-drawer-link">Dashboard</a><a href="insights.html" class="nav-drawer-link">Insights</a><a href="settings.html" class="nav-drawer-link">Settings</a><a href="ads.html" class="nav-drawer-link">Ads</a><a href="users.html" class="nav-drawer-link">Users</a>
  <div class="drawer-sep"></div><div class="drawer-actions"><button class="btn btn-ghost btn-full" onclick="document.getElementById('adminLogout').click()">Log out</button></div>
</div>

<div class="page-body" style="padding-top:calc(36px + var(--nav-h) + 24px);padding-bottom:60px">
  <div class="wrap">
    <div class="eyebrow mb12 reveal">People</div>
    <h1 class="h3 mb32 reveal d1">Registered <span class="grad-amber italic">students</span></h1>

    <div class="g4 reveal" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">
      <div class="kpi"><div class="kpi-label">Total users</div><div class="kpi-value" id="uTotal">—</div></div>
      <div class="kpi"><div class="kpi-label">KYC verified</div><div class="kpi-value" id="uVerified" style="color:var(--green)">—</div></div>
      <div class="kpi"><div class="kpi-label">Awaiting review</div><div class="kpi-value" id="uPending" style="color:var(--orange)">—</div></div>
    </div>

    <div class="card reveal d1">
      <div class="card-body">
        <div class="fw-600 mb16">All registered students</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Institution</th><th>KYC Status</th><th>Joined</th></tr></thead>
            <tbody id="usersBody"><tr><td colspan="6" style="text-align:center;padding:28px;color:var(--tx-4)">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="toastHost"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script type="module" src="../assets/js/app.js"></script>
</body>
</html>
