<!doctype html>
<html lang="en" data-theme="light" data-skin="aurora">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create account • Alpha Pack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="auth-bg">

  <div class="container py-5">
    <div class="mx-auto" style="max-width:560px">
      <div class="d-flex align-items-center justify-content-between mb-3 reveal">
        <a href="index.html" class="d-inline-flex align-items-center gap-2 text-decoration-none">
          <span class="brand-mark"><i class="bi bi-bank2"></i></span>
          <span class="fw-semibold text-body">Alpha Pack</span>
        </a>
        <div class="d-flex gap-2">
        </div>
      </div>

      <div class="cardx p-4 p-md-5 reveal">
        <h1 class="h3 fw-semibold mb-1">Create account</h1>
        <p class="text-muted mb-4">Then log in → verify ID → apply for loan.</p>

        <form id="registerForm">
          <div class="mb-3">
            <label class="form-label">Full name</label>
            <input class="form-control" name="name" required minlength="2" placeholder="Tumo Samakata" />
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" name="email" type="email" required placeholder="you@example.com" />
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input class="form-control" name="password" type="password" required minlength="6" placeholder="••••••••" />
            <div class="form-text text-muted">Prototype hashes passwords on localhost/https.</div>
          </div>

          <button class="btn btn-primary w-100 btn-lg" type="submit">
            <i class="bi bi-person-plus me-1"></i> Create account
          </button>
        </form>

        <div class="d-flex justify-content-between mt-3 small">
          <a class="link-muted" href="login.html">Already have an account?</a>
          <a class="link-muted" href="index.html">Back home</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
