<!doctype html>
<html lang="en" data-theme="light" data-skin="aurora">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Verification • Alpha Pack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="auth-bg">

  <nav class="navbar glass-nav border-bottom">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <span class="brand-mark"><i class="bi bi-bank2"></i></span>
        <span class="fw-semibold">Alpha Pack</span>
      </a>
      <div class="d-flex gap-2">
        <select id="skinSelect" class="form-select form-select-sm">
          <option value="aurora">Aurora</option><option value="neon">Neon</option>
          <option value="midnight">Midnight</option><option value="sunrise">Sunrise</option>
        </select>
        <button class="btn btn-ghost btn-sm" id="themeToggle" type="button">Theme</button>
        <a class="btn btn-outline-secondary btn-sm" href="dashboard.html">Dashboard</a>
        <button class="btn btn-outline-secondary btn-sm" id="logoutBtn" type="button">Log out</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row justify-content-center">
      <div class="col-lg-9">
        <div class="cardx p-4 p-md-5 reveal">
          <div class="d-flex justify-content-between flex-wrap gap-2">
            <div>
              <h1 class="h4 fw-semibold mb-1">Identity verification</h1>
              <p class="text-muted mb-0">Required before applying for loans.</p>
            </div>
            <span id="kycStatus" class="pill">Status: —</span>
          </div>

          <form id="kycForm" class="mt-4">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Document type</label>
                <select class="form-select" id="idType">
                  <option>Omang</option>
                  <option>Student ID</option>
                  <option>Passport</option>
                </select>
              </div>
              <div class="col-md-6 d-flex align-items-end justify-content-end gap-2">
                <button type="button" class="btn btn-primary-soft" id="openCam">
                  <i class="bi bi-camera me-1"></i> Use camera
                </button>
                <button type="button" class="btn btn-primary" id="kycSave">
                  <i class="bi bi-check2-circle me-1"></i> Submit verification
                </button>
              </div>
            </div>

            <div class="row g-3 mt-2">
              <div class="col-md-6">
                <label class="form-label">Front image</label>
                <input id="frontFile" class="form-control" type="file" accept="image/*" capture="environment">
                <img id="frontPreview" class="mt-2 w-100 rounded-4 border" alt="Front preview">
              </div>
              <div class="col-md-6">
                <label class="form-label">Back image</label>
                <input id="backFile" class="form-control" type="file" accept="image/*" capture="environment">
                <img id="backPreview" class="mt-2 w-100 rounded-4 border" alt="Back preview">
              </div>
            </div>

            <div class="mini-card mt-3">
              <div class="text-muted small">
                Camera + uploads require running on <b>localhost</b> or <b>https</b>. Prototype stores images locally (not production).
              </div>
            </div>
          </form>
        </div>

        <!-- Camera Modal (simple custom) -->
        <div id="camModal" class="d-none">
          <div class="cardx p-3 mt-3 reveal">
            <div class="d-flex justify-content-between align-items-center">
              <div class="fw-semibold"><i class="bi bi-camera me-1"></i> Camera</div>
              <button class="btn btn-outline-secondary btn-sm" id="closeCam">Close</button>
            </div>

            <div class="row g-3 mt-2">
              <div class="col-md-8">
                <video id="camVideo" class="w-100 rounded-4 border" playsinline></video>
              </div>
              <div class="col-md-4">
                <canvas id="camCanvas" class="w-100 rounded-4 border"></canvas>
                <div class="d-grid gap-2 mt-2">
                  <button class="btn btn-primary" id="snap" type="button">Snap</button>
                  <button class="btn btn-primary-soft" id="useSnapFront" type="button">Use as FRONT</button>
                  <button class="btn btn-primary-soft" id="useSnapBack" type="button">Use as BACK</button>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
