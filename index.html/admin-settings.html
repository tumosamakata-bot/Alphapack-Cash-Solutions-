<!doctype html>
<html lang="en" data-theme="light" data-skin="aurora">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Settings • AlphaPack MicroLending</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="auth-bg">

  <div id="adminSettingsPage"></div>

  <nav class="navbar glass-nav border-bottom">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="admin.html">
        <span class="brand-mark"><i class="bi bi-sliders"></i></span>
        <span class="fw-semibold">Admin Settings</span>
      </a>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary btn-sm" href="admin.html">Dashboard</a>
        <button class="btn btn-outline-secondary btn-sm" id="logoutBtn" type="button">Log out</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="cardx p-4 p-md-5 reveal">
      <div class="d-flex justify-content-between flex-wrap gap-2">
        <div>
          <h1 class="h4 fw-semibold mb-1">Homepage CMS</h1>
          <p class="text-muted mb-0">Update website messaging, ad content, and business contacts without touching code.</p>
        </div>
        <a class="btn btn-primary-soft" href="index.html"><i class="bi bi-eye me-1"></i> Preview home</a>
      </div>

      <form id="cmsForm" class="mt-4">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Hero title</label>
            <input class="form-control" name="heroTitle" placeholder="Loans that feel simple, not scary.">
          </div>
          <div class="col-md-4">
            <label class="form-label">Highlight word</label>
            <input class="form-control" name="heroHighlight" placeholder="simple">
          </div>
          <div class="col-md-4">
            <label class="form-label">Primary CTA text</label>
            <input class="form-control" name="heroCtaPrimary" placeholder="Start application">
          </div>
          <div class="col-md-4">
            <label class="form-label">Secondary CTA text</label>
            <input class="form-control" name="heroCtaSecondary" placeholder="View dashboard demo">
          </div>
          <div class="col-12">
            <label class="form-label">Hero subtitle</label>
            <textarea class="form-control" rows="2" name="heroSubtitle"></textarea>
          </div>
          <div class="col-md-4">
            <label class="form-label">Business phone</label>
            <input class="form-control" name="contactPhone" placeholder="+267 ...">
          </div>
          <div class="col-md-4">
            <label class="form-label">Business email</label>
            <input class="form-control" name="contactEmail" placeholder="info@...">
          </div>
          <div class="col-md-4">
            <label class="form-label">Office address</label>
            <input class="form-control" name="officeAddress" placeholder="City, street">
          </div>
          <div class="col-md-6">
            <label class="form-label">Ad section headline</label>
            <input class="form-control" name="adHeadline" placeholder="Promote with AlphaPack">
          </div>
          <div class="col-md-6">
            <label class="form-label">Ad section description</label>
            <input class="form-control" name="adCopy" placeholder="Monthly paid placements for partners">
          </div>

          <div class="col-12">
            <label class="form-label">Hero image upload</label>
            <input class="form-control" id="heroImageFile" type="file" accept="image/*">
            <img id="cmsHeroPreview" class="mt-2 w-100 rounded-4 border" alt="Hero preview">
          </div>
        </div>

        <hr class="my-4">

        <div class="fw-semibold">Feature cards (3)</div>
        <div class="text-muted small">Use Bootstrap Icons classes (example: <code>bi-shield-check</code>)</div>

        <div class="row g-3 mt-2">
          <div class="col-md-4">
            <label class="form-label">Feature 1 Icon</label>
            <input class="form-control" name="f0_icon">
            <label class="form-label mt-2">Title</label>
            <input class="form-control" name="f0_title">
            <label class="form-label mt-2">Description</label>
            <textarea class="form-control" rows="2" name="f0_desc"></textarea>
          </div>

          <div class="col-md-4">
            <label class="form-label">Feature 2 Icon</label>
            <input class="form-control" name="f1_icon">
            <label class="form-label mt-2">Title</label>
            <input class="form-control" name="f1_title">
            <label class="form-label mt-2">Description</label>
            <textarea class="form-control" rows="2" name="f1_desc"></textarea>
          </div>

          <div class="col-md-4">
            <label class="form-label">Feature 3 Icon</label>
            <input class="form-control" name="f2_icon">
            <label class="form-label mt-2">Title</label>
            <input class="form-control" name="f2_title">
            <label class="form-label mt-2">Description</label>
            <textarea class="form-control" rows="2" name="f2_desc"></textarea>
          </div>
        </div>

        <button class="btn btn-primary btn-lg w-100 mt-4" type="submit">
          <i class="bi bi-save me-1"></i> Save homepage changes
        </button>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
