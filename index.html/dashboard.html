<!doctype html>
<html lang="en" data-theme="light" data-skin="aurora">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard • Alpha Pack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="auth-bg">

  <div id="dashboardPage"></div>

  <nav class="navbar glass-nav border-bottom">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <span class="brand-mark"><i class="bi bi-bank2"></i></span>
        <span class="fw-semibold">Alpha Pack</span>
      </a>
      <div class="d-flex gap-2 align-items-center">
        <select id="skinSelect" class="form-select form-select-sm">
          <option value="aurora">Aurora</option><option value="neon">Neon</option>
          <option value="midnight">Midnight</option><option value="sunrise">Sunrise</option>
        </select>
        <button class="btn btn-ghost btn-sm" id="themeToggle" type="button">Theme</button>
        <button class="btn btn-outline-secondary btn-sm" id="logoutBtn" type="button"><i class="bi bi-box-arrow-right me-1"></i> Log out</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-3">
      <aside class="col-lg-3">
        <div class="cardx p-3 dash-sticky reveal">
          <div class="d-flex align-items-center gap-3">
            <div class="avatar" id="userInitials">AP</div>
            <div class="min-w-0">
              <div class="fw-semibold text-truncate" id="userName">User</div>
              <div class="small text-muted text-truncate" id="userEmail">email</div>
            </div>
          </div>
          <hr class="my-3">
          <div class="d-grid gap-2">
            <a class="btn btn-light text-start" href="apply.html"><i class="bi bi-wallet2 me-2"></i> Apply for loan</a>
            <a class="btn btn-light text-start" href="verify.html"><i class="bi bi-camera me-2"></i> Verification</a>
          </div>
          <div class="mt-3">
            <span class="pill" id="kycBadge">KYC: —</span>
          </div>
        </div>
      </aside>

      <section class="col-lg-9">
        <div class="cardx p-4 reveal">
          <div class="d-flex align-items-start justify-content-between gap-2">
            <div>
              <h1 class="h4 fw-semibold mb-1">My Loan Requests</h1>
              <p class="text-muted mb-0">Track status. No confusion.</p>
            </div>
            <span class="pill"><i class="bi bi-shield-check me-1"></i> v2 flow</span>
          </div>

          <div class="table-responsive mt-3">
            <table class="table table-sm align-middle mb-0">
              <thead>
                <tr><th>Date</th><th>Amount</th><th>Term</th><th>Status</th></tr>
              </thead>
              <tbody id="myLoans"></tbody>
            </table>
          </div>
        </div>

        <div class="cardx p-4 mt-3 reveal">
          <div class="fw-semibold">Admin links</div>
          <div class="text-muted small">Visible, but role-gated. Users can’t access without admin role.</div>
          <div class="d-flex gap-2 mt-2">
            <a class="btn btn-primary-soft" href="admin.html"><i class="bi bi-speedometer me-1"></i> Admin Dashboard</a>
            <a class="btn btn-outline-secondary" href="admin-settings.html"><i class="bi bi-sliders me-1"></i> Admin Settings</a>
          </div>
        </div>
      </section>
    </div>
  </main>

  <footer class="border-top">
    <div class="container py-4">
      <div class="small text-muted">© <span id="year"></span> Alpha Pack Cash Solutions</div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
