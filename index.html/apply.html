<!doctype html>
<html lang="en" data-theme="light" data-skin="aurora">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apply • Alpha Pack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="auth-bg">

  <div id="applyPage"></div>

  <nav class="navbar glass-nav border-bottom">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <span class="brand-mark"><i class="bi bi-bank2"></i></span>
        <span class="fw-semibold">Alpha Pack</span>
      </a>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary btn-sm" href="dashboard.html"><i class="bi bi-grid-1x2 me-1"></i> Dashboard</a>
        <button class="btn btn-outline-secondary btn-sm" id="logoutBtn" type="button"><i class="bi bi-box-arrow-right me-1"></i> Log out</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row justify-content-center">
      <div class="col-lg-9">
        <div class="cardx p-4 p-md-5 reveal">
          <div class="d-flex justify-content-between align-items-start gap-2">
            <div>
              <h1 class="h4 fw-semibold mb-1">Loan application</h1>
              <p class="text-muted mb-0">3 steps • stored safely (prototype)</p>
            </div>
            <span class="pill"><i class="bi bi-check2-circle me-1"></i> KYC required</span>
          </div>

          <div class="progress mt-4" style="height:10px">
            <div class="progress-bar" id="applyProgress" style="width:33%"></div>
          </div>

          <form id="applyForm" class="mt-4">
            <div class="step" data-step="1">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Amount (Pula)</label>
                  <input class="form-control" type="number" name="amount" min="100" max="50000" value="1500" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Term (months)</label>
                  <input class="form-control" type="number" name="term" min="1" max="24" value="3" required>
                </div>
              </div>
            </div>

            <div class="step d-none" data-step="2">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Employer</label>
                  <input class="form-control" name="employer" minlength="2" required placeholder="Company name">
                </div>
                <div class="col-md-6">
                  <label class="form-label">Monthly income (Pula)</label>
                  <input class="form-control" type="number" name="income" min="500" required placeholder="e.g. 4500">
                </div>
              </div>
            </div>

            <div class="step d-none" data-step="3">
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label">Purpose</label>
                  <input class="form-control" name="purpose" minlength="5" required placeholder="rent bridge, emergency, school fees">
                </div>
              </div>

              <div class="mini-card mt-3">
                <div class="fw-semibold">Summary</div>
                <div class="row g-2 mt-2 small">
                  <div class="col-6 text-muted">Amount</div><div class="col-6 text-end fw-semibold">P <span data-sum="amount">1500</span></div>
                  <div class="col-6 text-muted">Term</div><div class="col-6 text-end fw-semibold"><span data-sum="term">3</span> months</div>
                  <div class="col-6 text-muted">Estimated monthly</div><div class="col-6 text-end fw-semibold">P <span data-sum="monthly">—</span></div>
                  <div class="col-6 text-muted">Total repayable</div><div class="col-6 text-end fw-semibold">P <span data-sum="total">—</span></div>
                </div>
              </div>
            </div>

            <div class="d-flex flex-column-reverse flex-sm-row justify-content-between gap-2 mt-4">
              <button class="btn btn-outline-secondary" type="button" id="prevStep"><i class="bi bi-arrow-left me-1"></i> Back</button>
              <button class="btn btn-primary" type="button" id="nextStep">Continue <i class="bi bi-arrow-right ms-1"></i></button>
              <button class="btn btn-primary d-none" type="submit" id="submitApply"><i class="bi bi-check2-circle me-1"></i> Submit</button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
