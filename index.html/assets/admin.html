<!doctype html>
<html lang="en" data-theme="light" data-skin="aurora">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard • Alpha Pack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="auth-bg">

  <div id="adminPage"></div>

  <nav class="navbar glass-nav border-bottom">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <span class="brand-mark"><i class="bi bi-shield-lock"></i></span>
        <span class="fw-semibold">Admin</span>
      </a>
      <div class="d-flex gap-2">
        <select id="skinSelect" class="form-select form-select-sm">
          <option value="aurora">Aurora</option><option value="neon">Neon</option>
          <option value="midnight">Midnight</option><option value="sunrise">Sunrise</option>
        </select>
        <button class="btn btn-ghost btn-sm" id="themeToggle" type="button">Theme</button>
        <a class="btn btn-outline-secondary btn-sm" href="admin-settings.html"><i class="bi bi-sliders me-1"></i> Settings</a>
        <button class="btn btn-outline-secondary btn-sm" id="logoutBtn" type="button">Log out</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-3">
      <div class="col-md-3 reveal"><div class="cardx p-3"><div class="text-muted small">Pending Loans</div><div class="fs-3 fw-semibold" id="kpiPending">0</div></div></div>
      <div class="col-md-3 reveal"><div class="cardx p-3"><div class="text-muted small">Approved</div><div class="fs-3 fw-semibold" id="kpiApproved">0</div></div></div>
      <div class="col-md-3 reveal"><div class="cardx p-3"><div class="text-muted small">Disbursed</div><div class="fs-3 fw-semibold" id="kpiDisbursed">P 0</div></div></div>
      <div class="col-md-3 reveal"><div class="cardx p-3"><div class="text-muted small">Profit (demo)</div><div class="fs-3 fw-semibold" id="kpiProfit">P 0</div></div></div>
    </div>

    <div class="row g-3 mt-1">
      <div class="col-lg-6 reveal">
        <div class="cardx p-4">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <div class="fw-semibold">KYC Requests</div>
              <div class="text-muted small">Approve identity before loans</div>
            </div>
            <span class="pill"><i class="bi bi-camera me-1"></i> Verification</span>
          </div>

          <div class="table-responsive mt-3">
            <table class="table table-sm align-middle mb-0">
              <thead><tr><th>Name</th><th>Email</th><th>Doc</th><th class="text-end">Action</th></tr></thead>
              <tbody id="kycTable"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="col-lg-6 reveal">
        <div class="cardx p-4">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <div class="fw-semibold">Loan Requests</div>
              <div class="text-muted small">Approve / Decline + view details</div>
            </div>
            <span class="pill"><i class="bi bi-wallet2 me-1"></i> Loans</span>
          </div>

          <div class="table-responsive mt-3">
            <table class="table table-sm align-middle mb-0">
              <thead><tr><th>Date</th><th>User</th><th>Email</th><th>Amount</th><th>Term</th><th class="text-end">Action</th></tr></thead>
              <tbody id="loanTable"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Loan Modal -->
    <div class="modal fade" id="loanModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Loan Details</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body" id="loanModalBody"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
